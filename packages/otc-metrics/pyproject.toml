[project]
name = "otc-metrics"
version = "0.1.0"
description = "Continously write various metrics to .csv-files."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ntplib==0.4.0",
    "psutil==7.2.2",
    "smbus2==0.6.1; platform_system == 'Linux' and (platform_machine == 'aarch64' or platform_machine == 'armv7l')"
]

[dependency-groups]
dev = [
    "types-psutil==7.2.2.*",
]

[project.scripts]
otc-metrics = "otc_metrics.service:main"

[build-system]
requires = ["hatchling>=1.30.1,<2"]
build-backend = "hatchling.build"
