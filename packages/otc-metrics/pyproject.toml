[project]
name = "otc-metrics"
version = "0.1.0"
description = "Continously write various metrics to .csv-files."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ntplib>=0.4.0",
    "psutil>=7.2.2,<8",
]

[project.scripts]
otc-metrics = "otc_metrics.service:main"

[build-system]
requires = ["uv_build>=0.11.17,<0.12"]
build-backend = "uv_build"
